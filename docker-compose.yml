# Docker Compose — CasaSim.pt
#
#   docker compose up -d                        # production (db, api, scraper, frontend)
#   docker compose --profile observability up -d # + observability stack (otel+jaeger)

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-casasim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: casasim
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-casasim}\" -d \"$${POSTGRES_DB:-casasim}\""]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=casasim;Username=${POSTGRES_USER:-casasim};Password=${POSTGRES_PASSWORD:-changeme}
      ASPNETCORE_ENVIRONMENT: Production
      AdminSettings__ApiKey: ${AdminSettings__ApiKey:?AdminSettings__ApiKey is required}
    depends_on:
      - db
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    environment:
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=casasim;Username=${POSTGRES_USER:-casasim};Password=${POSTGRES_PASSWORD:-changeme}
      DOTNET_ENVIRONMENT: Production
      # Observability — set OTEL_EXPORTER_OTLP_ENDPOINT to activate (default: no export)
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OpenTelemetry__Otlp__Endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -s /proc/1/cmdline"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    expose:
      - "80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Observability (otel-collector + Jaeger) ──────────────────────
  # Activate with: docker compose --profile observability up -d
  # -----------------------------------------------------------------
  otel-collector:
    profiles: ["observability"]
    image: otel/opentelemetry-collector-contrib:0.120.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - jaeger
    restart: unless-stopped

  jaeger:
    profiles: ["observability"]
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Web UI
    restart: unless-stopped

volumes:
  postgres_data:
